<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaliBuilder</title>
</head>
<body style="margin:0; padding:0; background:white;">
    <div style="display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:Arial;">
        <p>Loading...</p>
    </div>

    <script>
        // Get parameters from URL
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name') || 'Unknown';
        const address = params.get('address') || 'Unknown';
        const trackingId = params.get('id') || 'unknown';

        // Redirect directly to Squarespace form with parameters
        const squareUrl = 'https://kangaroo-clownfish-y62l.squarespace.com/qr-code-tracker-form?name=' + 
            encodeURIComponent(name) + '&address=' + encodeURIComponent(address) +
            '&id=' + encodeURIComponent(trackingId);

        window.location.href = squareUrl;
    </script>
</body>
</html>
