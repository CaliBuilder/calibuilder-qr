<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaliBuilder - Redirecting...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a5f36 0%, #0f3d1f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            color: white;
        }
        h1 { font-size: 48px; margin-bottom: 20px; }
        p { font-size: 16px; opacity: 0.9; }
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-top: 30px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏗️</h1>
        <h2>CaliBuilder</h2>
        <p>Redirecting you to our website...</p>
        <div class="spinner"></div>
    </div>

    <script>
        // Get parameters from URL
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name') || 'Unknown';
        const address = params.get('address') || 'Unknown';
        const trackingId = params.get('id') || 'unknown';

        // Get device info
        const ua = navigator.userAgent;
        const device = /mobile|android|iphone|ipad|windows phone/i.test(ua) ? 'Mobile' : 'Desktop';
        let browser = 'Unknown';
        if (ua.includes('Chrome')) browser = 'Chrome';
        else if (ua.includes('Safari')) browser = 'Safari';
        else if (ua.includes('Firefox')) browser = 'Firefox';
        else if (ua.includes('Edge')) browser = 'Edge';

        // Get IP and location
        async function getLocationData() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                return {
                    ip: data.ip || 'Unknown',
                    city: data.city || 'Unknown',
                    region: data.region || 'Unknown'
                };
            } catch (e) {
                return { ip: 'Unknown', city: 'Unknown', region: 'Unknown' };
            }
        }

        // Send email via Formspree
        async function sendNotification() {
            const location = await getLocationData();
            const timestamp = new Date().toLocaleString();

            // Prepare email content
            const emailData = {
                _replyto: 'ramin@calibuilder.com',
                subject: '🎯 QR Scanned - ' + name,
                message: `
QR CODE SCAN NOTIFICATION

Name: ${name}
Address: ${address}
Tracking ID: ${trackingId}

DEVICE INFO:
Device: ${device}
Browser: ${browser}
IP Address: ${location.ip}
Location: ${location.city}, ${location.region}
Timestamp: ${timestamp}

This person was redirected to www.calibuilder.com
                `.trim()
            };

            try {
                // Send via Formspree (you'll need to set up a form)
                const response = await fetch('https://formspree.io/f/mnjlnoqj', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(emailData)
                });

                console.log('Notification sent:', response.status);
            } catch (error) {
                console.log('Could not send notification:', error);
            }

            // Redirect
            setTimeout(() => {
                window.location.href = 'https://www.calibuilder.com';
            }, 1000);
        }

        // Start the process
        sendNotification();
    </script>
</body>
</html>
