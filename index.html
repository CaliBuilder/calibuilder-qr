<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaliBuilder</title>
</head>
<body style="margin:0; padding:0; background:white;">
    <div style="display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:Arial;">
        <p>Loading...</p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name') || 'Unknown';
        const address = params.get('address') || 'Unknown';
        const trackingId = params.get('id') || 'unknown';
        const ua = navigator.userAgent;
        const device = /mobile|android|iphone|ipad|windows phone/i.test(ua) ? 'Mobile' : 'Desktop';
        let browser = 'Unknown';
        if (ua.includes('Chrome')) browser = 'Chrome';
        else if (ua.includes('Safari')) browser = 'Safari';
        else if (ua.includes('Firefox')) browser = 'Firefox';
        else if (ua.includes('Edge')) browser = 'Edge';
        const timestamp = new Date().toLocaleString();

        async function getLocation() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                return { ip: data.ip || 'Unknown', city: data.city || 'Unknown', region: data.region || 'Unknown' };
            } catch (e) {
                return { ip: 'Unknown', city: 'Unknown', region: 'Unknown' };
            }
        }

        async function start() {
            const location = await getLocation();
            const fullLocation = location.city + ', ' + location.region;

            // REDIRECT IMMEDIATELY
            window.location.href = 'https://www.calibuilder.com';

            // Send email notification in background
            setTimeout(() => {
                try {
                    fetch('https://script.google.com/macros/d/AKfycbyK1pWJuApueCThqQGqT_sY-T7mY-1UnXskJ01HZVjoXSJ9nXTFgwePKkX16hyKOOxH3A/usercontent?name=' +
                        encodeURIComponent(name) + '&address=' + encodeURIComponent(address) +
                        '&id=' + encodeURIComponent(trackingId) + '&device=' + encodeURIComponent(device) +
                        '&browser=' + encodeURIComponent(browser) + '&location=' + encodeURIComponent(fullLocation) +
                        '&ip=' + encodeURIComponent(location.ip) + '&timestamp=' + encodeURIComponent(timestamp)
                    ).catch(() => {});
                } catch (e) {}
            }, 100);
        }

        start();
    </script>
</body>
</html>
