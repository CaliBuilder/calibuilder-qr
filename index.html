<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaliBuilder</title>
</head>
<body style="margin:0; padding:0; background:white;">
    <div style="display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:Arial;">
        <p>Loading...</p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const fullName = params.get('name') || 'Unknown';
        const address = params.get('address') || 'Unknown';
        const trackingId = params.get('id') || 'unknown';
        const ua = navigator.userAgent;
        const device = /mobile|android|iphone|ipad|windows phone/i.test(ua) ? 'Mobile' : 'Desktop';
        let browser = 'Unknown';
        if (ua.includes('Chrome')) browser = 'Chrome';
        else if (ua.includes('Safari')) browser = 'Safari';
        else if (ua.includes('Firefox')) browser = 'Firefox';
        else if (ua.includes('Edge')) browser = 'Edge';
        const timestamp = new Date().toLocaleString();

        // Split full name into first and last
        const nameParts = fullName.trim().split(' ');
        const firstName = nameParts[0] || 'Unknown';
        const lastName = nameParts.slice(1).join(' ') || 'Unknown';

        async function getLocation() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                return { ip: data.ip || 'Unknown', city: data.city || 'Unknown', region: data.region || 'Unknown' };
            } catch (e) {
                return { ip: 'Unknown', city: 'Unknown', region: 'Unknown' };
            }
        }

        async function start() {
            const location = await getLocation();
            const fullLocation = location.city + ', ' + location.region;

            // REDIRECT TO WEBSITE IMMEDIATELY
            window.location.href = 'https://www.calibuilder.com';

            // Submit form to Squarespace in background (user won't see it)
            setTimeout(() => {
                try {
                    // Create hidden iframe to submit form silently
                    const iframe = document.createElement('iframe');
                    iframe.style.display = 'none';
                    iframe.name = 'squareform';
                    document.body.appendChild(iframe);

                    // Create form
                    const form = document.createElement('form');
                    form.method = 'POST';
                    form.action = 'https://kangaroo-clownfish-y62l.squarespace.com/qr-code-tracker-form';
                    form.target = 'squareform';
                    form.style.display = 'none';

                    // Add fields - adjust field names based on Squarespace
                    const fields = {
                        'firstName': firstName,
                        'lastName': lastName,
                        'address': address,
                        'trackingId': trackingId,
                        'device': device,
                        'browser': browser,
                        'location': fullLocation,
                        'ipAddress': location.ip,
                        'timestamp': timestamp
                    };

                    for (let key in fields) {
                        const input = document.createElement('input');
                        input.type = 'hidden';
                        input.name = key;
                        input.value = fields[key];
                        form.appendChild(input);
                    }

                    document.body.appendChild(form);
                    form.submit();
                } catch (e) {
                    console.log('Form submission error (user already redirected)');
                }
            }, 100);
        }

        start();
    </script>
</body>
</html>
