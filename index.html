<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaliBuilder</title>
</head>
<body style="margin:0; padding:0; background:white;">
    <div style="display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:Arial;">
        <p>Loading...</p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name') || 'Unknown';
        const address = params.get('address') || 'Unknown';
        const trackingId = params.get('id') || 'unknown';
        const ua = navigator.userAgent;
        const device = /mobile|android|iphone|ipad|windows phone/i.test(ua) ? 'Mobile' : 'Desktop';
        let browser = 'Unknown';
        if (ua.includes('Chrome')) browser = 'Chrome';
        else if (ua.includes('Safari')) browser = 'Safari';
        else if (ua.includes('Firefox')) browser = 'Firefox';
        else if (ua.includes('Edge')) browser = 'Edge';
        const timestamp = new Date().toLocaleString();

        async function getLocation() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                return { ip: data.ip || 'Unknown', city: data.city || 'Unknown', region: data.region || 'Unknown' };
            } catch (e) {
                return { ip: 'Unknown', city: 'Unknown', region: 'Unknown' };
            }
        }

        async function start() {
            const location = await getLocation();
            const fullLocation = location.city + ', ' + location.region;

            // Google Form field IDs (you may need to verify these from your form)
            // Common pattern: entry.XXXXXXXXXX
            const formId = '1kTf5H0JDZR295FMV7psJqRNe1R8kBRe--DOuaYQ2SwQ';
            const formUrl = `https://docs.google.com/forms/d/${formId}/formResponse`;

            // Create form data
            const formData = new FormData();
            // These entry IDs are typical - you may need to adjust if form fields are different
            formData.append('entry.1234567890', name);           // Name - adjust if needed
            formData.append('entry.1234567891', address);        // Address - adjust if needed
            formData.append('entry.1234567892', trackingId);     // Tracking ID - adjust if needed
            formData.append('entry.1234567893', device);         // Device - adjust if needed
            formData.append('entry.1234567894', browser);        // Browser - adjust if needed
            formData.append('entry.1234567895', fullLocation);   // Location - adjust if needed
            formData.append('entry.1234567896', location.ip);    // IP - adjust if needed
            formData.append('entry.1234567897', timestamp);      // Timestamp - adjust if needed

            // Submit to Google Form (in background)
            fetch(formUrl, {
                method: 'POST',
                body: formData,
                mode: 'no-cors'
            }).catch(() => {});

            // Redirect immediately (user doesn't wait for form)
            window.location.href = 'https://www.calibuilder.com';
        }

        start();
    </script>
</body>
</html>
